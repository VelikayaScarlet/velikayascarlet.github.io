<meta charset="utf-8">

{% include seo.html %}

<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ 'assets/css/main.css' | relative_url }}">

<meta http-equiv="cleartype" content="on">
<script>
  // 外链自动新页打开（回阶式监听 click）
  document.addEventListener('click', function (e) {
    var a = e.target && e.target.closest && e.target.closest('a[href]');
    if (!a) return;
    var href = a.getAttribute('href') || '';
    // 忽略锚点 / mailto / 单箭文件
    if (!href || href.charAt(0) === '#' || /^(mailto|tel|javascript):/i.test(href)) return;
    // 只对 http(s) 协议判断，否则相对路径
    if (!/^https?:/i.test(href)) return;
    // 和当前页 host 不同才翻 target
    try {
      var u = new URL(href, location.href);
      if (u.host && u.host !== location.host) a.target = '_blank';
    } catch (err) {}
  });
</script>

<script>
  // in-page anchor smooth scroll (avoid intro animation timing)
  document.addEventListener('click', function (e) {
    var a = e.target && e.target.closest && e.target.closest('a[href]');
    if (!a) return;
    var href = a.getAttribute('href') || '';
    if (href.charAt(0) !== '#') return;
    if (href.length < 2) return;
    var id = href.slice(1);
    var target = document.getElementById(id);
    if (!target) return;
    e.preventDefault();
    var masthead = document.querySelector('.masthead');
    var offset = masthead ? masthead.getBoundingClientRect().height : 0;
    var y = target.getBoundingClientRect().top + window.pageYOffset - offset - 8;
    window.scrollTo({ top: y, behavior: 'smooth' });
    history.pushState(null, '', href);
  });
</script>


<!--
  原 <base target="_blank"> 已移除。
  原因：它会强制所有 <a> 在新标签页打开，导致 masthead 上的站内链接
        （Homepage / Poems / Essays 等）也跳新页面，体验割裂。
  行为变更：
    - 站内链接：默认在当前页打开（同页锚点直接滚动）
    - 站外链接：需要 target="_blank" 的，请手动加在该 <a> 上
-->
