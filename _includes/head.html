<script>
  // 外链自动新页打开（回阶式监听 click）
  document.addEventListener('click', function (e) {
    var a = e.target && e.target.closest && e.target.closest('a[href]');
    if (!a) return;
    var href = a.getAttribute('href') || '';
    // 忽略锚点 / mailto / 单箭文件
    if (!href || href.charAt(0) === '#' || /^(mailto|tel|javascript):/i.test(href)) return;
    // 只对 http(s) 协议判断，否则相对路径
    if (!/^https?:/i.test(href)) return;
    // 和当前页 host 不同才翻 target
    try {
      var u = new URL(href, location.href);
      if (u.host && u.host !== location.host) a.target = '_blank';
    } catch (err) {}
  });
</script>

<script>
  // In-page anchor scroll (handles both same-page and cross-page)
  function scrollToAnchor(id) {
    var t = document.getElementById(id);
    if (!t) return false;
    var m = document.querySelector('.masthead');
    var off = m ? m.getBoundingClientRect().height : 0;
    var y = t.getBoundingClientRect().top + window.pageYOffset - off - 8;
    window.scrollTo(0, Math.max(0, y));
    return true;
  }
  document.addEventListener('click', function (e) {
    var a = e.target && e.target.closest ? e.target.closest('a[href]') : null;
    if (!a) return;
    var href = a.getAttribute('href') || '';
    if (href.charAt(0) !== '#' && href.indexOf('#') < 0) return;
    if (href.length < 2) return;
    // extract the anchor id (works for both '#news' and '/#news' and '/path#news')
    var hashIdx = href.indexOf('#');
    var id = href.slice(hashIdx + 1);
    if (!id) return;
    // Cross-page? Only intercept on same page.
    var cur = (location.pathname || '/').replace(/\/$/, '') || '/';
    var tgt = (a.pathname || '/').replace(/\/$/, '') || '/';
    if (cur !== tgt) return;
    if (scrollToAnchor(id)) e.preventDefault();
  });
  // On cross-page load, give layout time, then scroll.
  // Re-attempt up to 20 times with 50ms gap (1s total) until target is in DOM and positioned.
  function tryDelayedScroll(id, attempt) {
    attempt = attempt || 0;
    var t = document.getElementById(id);
    if (t && t.getBoundingClientRect().top !== 0) {
      scrollToAnchor(id);
    } else if (attempt < 20) {
      setTimeout(function () { tryDelayedScroll(id, attempt + 1); }, 50);
    }
  }
  window.addEventListener('load', function () {
    if (location.hash && location.hash.length > 1) {
      tryDelayedScroll(location.hash.slice(1));
    }
  });
</script>
