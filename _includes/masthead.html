<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item"><a href="/">Homepage</a></li>
          {% for link in site.data.navigation.main %}
            {% assign link_url = link.url | remove: '/' %}
            {% assign page_url = page.url | remove: '/' %}
            <li class="masthead__menu-item{% if link_url == page_url %} masthead__menu-item--active{% endif %}"><a href="{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
