<!-- Password gate for 玻璃蒂克 section.
     Default password: bolidik
     To change: generate a new hash with:
       echo -n "your-password" | sha256sum
     Then replace EXPECTED_HASH below.
-->
<style>
#pwd-gate-overlay {
  position: fixed;
  inset: 0;
  background: #faf8f5;
  z-index: 99999;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Georgia, "Songti SC", "STSong", serif;
}
#pwd-gate-box {
  text-align: center;
  max-width: 340px;
  padding: 2.5em 2em;
}
#pwd-gate-box h2 {
  font-size: 1.3em;
  color: #4a3728;
  margin-bottom: 0.3em;
  font-weight: normal;
}
#pwd-gate-box p {
  font-size: 0.85em;
  color: #999;
  margin-bottom: 1.5em;
}
#pwd-gate-box input {
  display: block;
  width: 100%;
  padding: 0.6em 0.9em;
  font-size: 1em;
  font-family: inherit;
  border: 1px solid #d5c8b0;
  border-radius: 4px;
  background: #fff;
  color: #4a3728;
  text-align: center;
  letter-spacing: 0.15em;
  outline: none;
  box-sizing: border-box;
  margin-bottom: 0.8em;
}
#pwd-gate-box input:focus {
  border-color: #c8a97e;
  box-shadow: 0 0 0 2px rgba(200,169,126,0.2);
}
#pwd-gate-error {
  font-size: 0.8em;
  color: #c44;
  min-height: 1.2em;
}
</style>

<div id="pwd-gate-overlay">
  <div id="pwd-gate-box">
    <h2>🔒 玻璃蒂克</h2>
    <p>请输入密码以继续阅读</p>
    <input type="password" id="pwd-gate-input" placeholder="密码" autofocus />
    <div id="pwd-gate-error"></div>
  </div>
</div>

<script>
(async function () {
  const OVERLAY = document.getElementById('pwd-gate-overlay');
  const INPUT   = document.getElementById('pwd-gate-input');
  const ERROR   = document.getElementById('pwd-gate-error');
  // Your SHA-256 hash here ───┐
  const EXPECTED = '8ced8b1fc0c4b2b8d591ecb915f11cd87d00fe8fbdcd8495c7ab85647ae535b3';

  async function sha256(text) {
    const buf = new TextEncoder().encode(text);
    const hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash))
      .map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function hide() {
    OVERLAY.style.display = 'none';
    document.body.style.overflow = '';
  }

  INPUT.addEventListener('keydown', async function (e) {
    if (e.key !== 'Enter') return;
    ERROR.textContent = '';
    const hash = await sha256(INPUT.value);
    if (hash === EXPECTED) {
      hide();
    } else {
      ERROR.textContent = '密码错误，请重试';
      INPUT.value = '';
      INPUT.focus();
    }
  });

  // Prevent body scroll while overlay is up
  document.body.style.overflow = 'hidden';
})();
</script>
